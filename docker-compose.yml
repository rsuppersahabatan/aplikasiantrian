version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Web server (PHP + Apache)
  # ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${WEB_CONTAINER_NAME:-antrian_web}
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      # Mount folder data agar sinkron dengan websocket container
      - antrian_data:/var/www/html/data
    restart: unless-stopped
    depends_on:
      - websocket
    networks:
      - antrian_net

  # ─────────────────────────────────────────────
  # WebSocket server (Ratchet PHP)
  # ─────────────────────────────────────────────
  websocket:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    container_name: ${WS_CONTAINER_NAME:-antrian_ws}
    ports:
      - "${WS_PORT:-8080}:8080"
    volumes:
      # Gunakan volume yang sama agar file data/ terbagi
      - antrian_data:/app/data
    restart: unless-stopped
    networks:
      - antrian_net

# ─────────────────────────────────────────────
# Volume bersama untuk folder data/
# ─────────────────────────────────────────────
volumes:
  antrian_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

networks:
  antrian_net:
    driver: bridge
